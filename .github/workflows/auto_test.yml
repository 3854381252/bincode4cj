name: Auto Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Cangjie
        uses: Zxilly/setup-cangjie@v3
        with:
          channel: sts             
          version: 0.53.13          
      - name: Test
        run: |
          cjc --version
          cd repo_workspace
          cjpm update
          cjpm build
          cjpm test
