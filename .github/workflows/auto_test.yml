# =============================================================================
# bincode4cj CI Pipeline
# =============================================================================
#
# 触发条件:
#   - push 到 main 分支
#   - 任何 PR (含来自 fork 的 PR)
#   - 手动触发 (workflow_dispatch)
#
# 环境:
#   - Cangjie 1.0.5 LTS SDK
#   - Linux amd64 (Docker: zxilly/cangjie:1.0.5)
#   - macOS aarch64 (直接下载 SDK)
#
# 步骤:
#   1. Setup Cangjie SDK
#   2. Build (cjpm build)
#   3. Test (cjpm test)
#   4. Lint / Format Check (cjfmt --check)
#   5. Coverage (可选，手动触发时)
# =============================================================================

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "doc/**"
      - ".gitignore"
      - "LICENSE*"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "doc/**"
      - ".gitignore"
      - "LICENSE*"
  workflow_dispatch:
    inputs:
      run_coverage:
        description: "Run coverage report"
        type: boolean
        default: false

# 并发控制：同一分支同一组只运行一个流水线，新的会取消旧的
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CANGJIE_VERSION: "1.0.5"
  PROJECT_DIR: bincode4cj

defaults:
  run:
    working-directory: bincode4cj

jobs:

  # ===========================================================================
  # Job 1: Build & Test
  # ===========================================================================
  build-and-test:
    name: "Build & Test (${{ matrix.name }})"
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---------- Linux: 使用 Docker 镜像 (SDK 预装) ----------
          - name: Linux-amd64
            os: ubuntu-latest
            target: linux_x86_64_cjnative
            container: zxilly/cangjie:1.0.5
            # macOS 不需要，因为 Linux 用 Docker
            sdk_url: ""
            sdk_sha256: ""

          # ---------- macOS: 直接下载 SDK ----------
          - name: macOS-aarch64
            os: macos-latest
            target: darwin_aarch64_cjnative
            container: null
            sdk_url: "https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-mac-aarch64-1.0.5.tar.gz&objectKey=698acea5bd66ae22b62330ae"
            sdk_sha256: "E07D22584237F065B30A771B7110A87A8931334C40BE3A148090944AE916ED1F"

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ---------- macOS: 下载 SDK ----------
      - name: "Setup Cangjie SDK (macOS)"
        if: runner.os == 'macOS'
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          echo "Downloading Cangjie SDK for macOS..."
          CANGJIE_HOME="${{ github.workspace }}/cangjie-sdk"
          curl -L -o cangjie-sdk.tar.gz "${{ matrix.sdk_url }}"
          echo "Verifying SHA256..."
          echo "${{ matrix.sdk_sha256 }}  cangjie-sdk.tar.gz" | shasum -a 256 -c -
          echo "Extracting SDK to $CANGJIE_HOME..."
          mkdir -p "$CANGJIE_HOME"
          tar -xzf cangjie-sdk.tar.gz -C "$CANGJIE_HOME" --strip-components=1
          rm -f cangjie-sdk.tar.gz
          echo "CANGJIE_HOME=$CANGJIE_HOME" >> $GITHUB_ENV
          echo "$CANGJIE_HOME/bin" >> $GITHUB_PATH
          echo "$CANGJIE_HOME/tools/bin" >> $GITHUB_PATH
          echo "SDK setup complete at $CANGJIE_HOME"

      # ---------- macOS: 设置 SDKROOT 解决链接器问题 ----------
      - name: "Setup macOS SDK Environment"
        if: runner.os == 'macOS'
        shell: bash
        run: |
          SDKROOT=$(xcrun --sdk macosx --show-sdk-path 2>/dev/null || echo "/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk")
          echo "SDKROOT=$SDKROOT" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=12.0" >> $GITHUB_ENV
          echo "SDKROOT set to: $SDKROOT"

      - name: "Verify Toolchain"
        shell: bash
        run: |
          echo "CJC version: $(cjc --version 2>/dev/null || echo 'N/A')"
          echo "CJPM version: $(cjpm --version 2>/dev/null || echo 'N/A')"
          echo "CANGJIE_HOME: ${CANGJIE_HOME:-/opt/cangjie}"

      - name: "Build"
        shell: bash
        run: |
          cjpm build
        env:
          CANGJIE_HOME: ${{ env.CANGJIE_HOME || '/opt/cangjie' }}
          SDKROOT: ${{ env.SDKROOT || '' }}
          MACOSX_DEPLOYMENT_TARGET: ${{ env.MACOSX_DEPLOYMENT_TARGET || '12.0' }}

      - name: "Run Tests"
        shell: bash
        run: |
          cjpm test
        env:
          CANGJIE_HOME: ${{ env.CANGJIE_HOME || '/opt/cangjie' }}
          SDKROOT: ${{ env.SDKROOT || '' }}
          MACOSX_DEPLOYMENT_TARGET: ${{ env.MACOSX_DEPLOYMENT_TARGET || '12.0' }}

  # ===========================================================================
  # Job 2: Lint / Format — 代码风格检查
  # ===========================================================================
  lint:
    name: "Lint & Format Check"
    runs-on: ubuntu-latest
    container: zxilly/cangjie:1.0.5
    needs: [build-and-test]

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "Verify Toolchain"
        shell: bash
        run: |
          echo "cjfmt: $(cjfmt --version 2>/dev/null || echo 'N/A')"
          echo "cjlint: $(cjlint --version 2>/dev/null || echo 'N/A')"

      - name: "Check Formatting (cjfmt --check)"
        shell: bash
        working-directory: bincode4cj
        run: |
          if command -v cjfmt &> /dev/null; then
            cjfmt --check src/
            echo "✅ Format check passed."
          else
            echo "⚠️ cjfmt not available, skipping format check."
          fi

      - name: "Lint (cjlint)"
        shell: bash
        working-directory: bincode4cj
        continue-on-error: true
        run: |
          if command -v cjlint &> /dev/null; then
            cjlint src/ --warnings-as-errors 2>&1 || echo "⚠️ Lint warnings found (non-blocking)"
          else
            echo "⚠️ cjlint not available, skipping lint."
          fi

  # ===========================================================================
  # Job 3: Coverage — 仅手动触发时运行
  # ===========================================================================
  coverage:
    name: "Coverage Report"
    runs-on: ubuntu-latest
    container: zxilly/cangjie:1.0.5
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_coverage }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "Build with Coverage"
        shell: bash
        working-directory: bincode4cj
        run: |
          cjpm build --coverage

      - name: "Run Tests with Coverage"
        shell: bash
        working-directory: bincode4cj
        run: |
          cjpm test --coverage

      - name: "Generate Coverage Report"
        shell: bash
        working-directory: bincode4cj
        run: |
          if command -v cjcov &> /dev/null; then
            cjcov -r . -o cov_output --html-details -s src/
            echo "Coverage report generated at: cov_output/"
          else
            echo "⚠️ cjcov not available, skipping coverage report generation."
          fi

      - name: "Upload Coverage Report"
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: bincode4cj/cov_output/
          retention-days: 14

  # ===========================================================================
  # Job 4: Summary — 汇总状态
  # ===========================================================================
  summary:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [build-and-test, lint]
    if: ${{ always() }}

    steps:
      - name: "Check Results"
        shell: bash
        run: |
          BUILD_STATUS="${{ needs.build-and-test.result }}"
          LINT_STATUS="${{ needs.lint.result }}"
          echo "## Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | $BUILD_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Format | $LINT_STATUS |" >> $GITHUB_STEP_SUMMARY
          if [ "$BUILD_STATUS" = "success" ] && [ "$LINT_STATUS" = "success" ]; then
            echo "✅ **All checks passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some checks failed.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
